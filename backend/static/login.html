<!DOCTYPE html>
<html>
<head>
<title>Login - SmartLife AI</title>

<style>

body{
font-family:Arial;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

input{
padding:10px;
width:200px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:10px;
padding:10px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>SmartLife AI Login</h2>

<input id="username" placeholder="Enter your name">

<br>

<button onclick="login()">Login</button>

</div>

<script>

async function login(){

let username = document.getElementById("username").value

if(!username){
alert("Enter username")
return
}

await fetch("/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username:username})
})

window.location.href="/"

}

</script>

</body>
</html>
